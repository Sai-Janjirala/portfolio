<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="google-site-verification" content="CL7dOjVWRlbnhiB7oRBPok0g2TcFt7Kd9bK3xosyh-I" />
    <title>Sai Janjirala | Full-Stack Developer</title>
    <meta name="description" content="Sai Janjirala — Full-Stack Developer crafting pixel-perfect, performant web experiences with React and modern technologies." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://sai-janjirala-portfolio.vercel.app" />

    <!-- Open Graph -->
    <meta property="og:title" content="Sai Janjirala — Full-Stack Developer" />
    <meta property="og:description" content="Portfolio of Sai Janjirala, a Full-Stack Developer specialising in React, TypeScript, Node.js. View my projects and get in touch." />
    <meta property="og:url" content="https://sai-janjirala-portfolio.vercel.app" />
    <meta property="og:image" content="https://sai-janjirala-portfolio.vercel.app/og-image.png" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Font connections: preconnect eliminates RTT, dns-prefetch as fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />

    <!-- Non-render-blocking font load: media=print switches to all after load -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Syne:wght@700;800&display=swap" />
    </noscript>

    <!-- Critical inline CSS: prevents white flash, fonts visible immediately with system fallback matching metrics to avoid CLS -->
    <style>
      @font-face {
        font-family: 'Space Grotesk Fallback';
        src: local('Arial');
        /* Metrics adjusted to match Space Grotesk bounds */
        size-adjust: 106%;
        ascent-override: 95%;
        descent-override: 25%;
        line-gap-override: 0%;
      }
      @font-face {
        font-family: 'Syne Fallback';
        src: local('Arial');
        size-adjust: 110%;
        ascent-override: 90%;
        descent-override: 20%;
      }
      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: auto; }
      html, body { margin: 0; padding: 0; background-color: #0a0a0b; color: #ede8e3; }
      body { font-family: 'Space Grotesk', 'Space Grotesk Fallback', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
      #root { min-height: 100vh; }
    </style>

    <!-- JSON-LD structured data (non-render-blocking) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Sai Janjirala",
        "url": "https://sai-janjirala-portfolio.vercel.app",
        "jobTitle": "Full-Stack Developer",
        "sameAs": [
          "https://github.com/Sai-Janjirala",
          "https://www.linkedin.com/in/sai-janjirala-5704a6394/"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
